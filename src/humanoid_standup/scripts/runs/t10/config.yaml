env:
  num_envs: 8192
  num_actions: 23
  spacing: 1.0
  action_scale: 1.0
  clip_actions: 100.0
  episode_length_s: 8.0
  sim:
    dt: 0.005
    substeps: 1
    gravity:
    - 0.0
    - 0.0
    - -9.81
  control:
    decimation: 4
    use_sim_PD_controller: true
    simulate_action_latency: false
    kp:
      hip: 100.0
      knee: 150.0
      ankle: 40.0
      waist: 300.0
      shoulder: 100.0
      elbow: 50.0
    kd:
      hip: 2.0
      knee: 4.0
      ankle: 2.0
      waist: 3.0
      shoulder: 2.0
      elbow: 2.0
