    - left_elbow_joint
    - right_shoulder_pitch_joint
    - right_shoulder_roll_joint
    - right_shoulder_yaw_joint
    - right_elbow_joint
obs:
  num_obs: 78
  scales:
    lin_vel: 2.0
    ang_vel: 0.25
    dof_pos: 1.0
    dof_vel: 0.05
reward:
  scales:
    standup: 10.0
    target_height: 0.8
    action_rate: -0.01
    dof_vel: -0.001
    termination: -100.0
    feet_contact: 0.2
    pose: 2.0
    pose_sigma: 5.0
models:
  policy:
    layers:
    - 512
    - 256
    - 128
    activation: elu
  value:
    layers:
    - 512
    - 256
    - 128
    activation: elu
training:
  rollouts: 24
  learning_rate: 0.001
  discount_factor: 0.99
  lambda: 0.95
  learning_rate_scheduler: kl
  kl_threshold: 0.008
  max_iterations: 15000
  save_interval: 50
  exp_name: t10
